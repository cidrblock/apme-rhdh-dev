apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: apme-register-git-repository
  title: Register repo for Ansible content modernization
  description: >-
    Registers your playbook or automation repository in the automation
    portal catalog so it appears in Git Repos and you can run Ansible content
    modernization from the Quality tab (scan, fix, open a PR). Registers
    directly by default, no catalog-info.yaml or pull request required.
    GitHub (github.com) only.
  tags:
    - apme
    - quality
    - git-repository
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Repository
      description: >-
        Select an existing **GitHub (github.com)** repository. Host is fixed to
        github.com — choose owner/org and repository name separately. Do not
        paste a full URL. Backstage may prompt for GitHub credentials when the
        repository requires them (for example private repos or opening a PR).
      required:
        - repoUrl
        - defaultBranch
      properties:
        repoUrl:
          title: GitHub repository
          type: string
          description: >-
            Host is locked to github.com. Enter owner/org and repository name
            in the picker fields.
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        defaultBranch:
          title: Default branch
          type: string
          default: main
          description: >-
            Branch used for modernization scans. Confirm on GitHub (Code →
            branch dropdown) if unsure — many repos use `main`, but older
            repos may use `master`. The Quality tab validates this branch
            before scanning.
        openPullRequest:
          title: Open a pull request instead
          type: boolean
          default: false
          description: >-
            Adds a catalog-info.yaml to the repository via a pull request
            instead of registering it directly. The entity only appears in
            the catalog after the pull request is merged and re-imported.

  steps:
    - id: register-direct
      name: Register in catalog
      if: ${{ not parameters.openPullRequest }}
      action: ansible:register:git-repository
      input:
        sourceControlProvider: github
        repositoryOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
        repositoryName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
        repositoryUrl: https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}
        defaultBranch: ${{ parameters.defaultBranch }}

    - id: fetch-base
      name: Generate catalog-info.yaml
      if: ${{ parameters.openPullRequest }}
      action: fetch:template
      input:
        url: ./content
        values:
          entityName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          org: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoUrl: https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}
          defaultBranch: ${{ parameters.defaultBranch }}
          owner: user:${{ user.entity.metadata.namespace }}/${{ user.entity.metadata.name }}

    - id: publish-pr
      name: Open pull request
      if: ${{ parameters.openPullRequest }}
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: backstage-apme-catalog-info
        title: Add catalog-info.yaml for Ansible content modernization
        description: |
          Registers this repository in the automation portal catalog as a git-repository
          so teams can run Ansible content modernization scans and fixes from the Quality tab.

          After merge, import or refresh the catalog entity, then open **Quality → Register and scan**.
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    - id: register-via-pr
      name: Register in catalog (optional)
      if: ${{ parameters.openPullRequest }}
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}/blob/${{ parameters.defaultBranch }}/catalog-info.yaml
        optional: true

  output:
    links:
      - title: Pull request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Go to Git Repositories
        icon: catalog
        url: /self-service/repositories/catalog
      - title: Open repository
        icon: catalog
        url: /self-service/repositories/${{ steps['register-direct'].output.entityName or (parameters.repoUrl | parseRepoUrl).repo }}
    text:
      - title: Next steps
        content: |
          **If you registered directly (default):** your repository is already visible
          in **Git Repos**. Open it and go to **Quality → Register and scan** to run
          Ansible content modernization (Select issues → Create pull request).

          **If you chose to open a pull request instead:** review and merge the pull
          request first. If the entity isn't visible yet afterwards, use
          **Self-service → Catalog import** with your repo URL, then open
          **Quality → Register and scan**.
